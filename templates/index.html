    <script>
      async function adminLogin() {
          if (!window.PublicKeyCredential) {
              console.error('WebAuthn is not supported on this browser.');
              return;
          }
  
          try {
              const publicKey = {
                  challenge: new Uint8Array([ // Normally generated by the server
                      0x8c, 0xc0, 0x9d, 0x4c, 0xc5, 0xac, 0x93, 0x28,
                      0x2f, 0x59, 0x33, 0x4f, 0x9f, 0x40, 0x31, 0x92
                  ]),
                  rp: {
                      name: "Printed Admin",
                  },
                  user: {
                      id: new Uint8Array(16), // This should be unique to the user
                      name: "admin",
                      displayName: "Admin",
                  },
                  pubKeyCredParams: [
                      {
                          type: "public-key",
                          alg: -7
                      }
                  ],
                  timeout: 60000,
                  attestation: "direct",
                  authenticatorSelection: {
                      authenticatorAttachment: "platform",
                      requireResidentKey: false,
                      userVerification: "required"
                  }
              };
  
              const credential = await navigator.credentials.create({ publicKey });
  
              if (credential) {
                  // Send the credential to the server for verification
                  const response = await fetch('/verify-credential', {
                      method: 'POST',
                      headers: {
                          'Content-Type': 'application/json'
                      },
                      body: JSON.stringify({
                          id: credential.id,
                          rawId: Array.from(new Uint8Array(credential.rawId)),
                          type: credential.type,
                          response: {
                              clientDataJSON: Array.from(new Uint8Array(credential.response.clientDataJSON)),
                              attestationObject: Array.from(new Uint8Array(credential.response.attestationObject))
                          }
                      })
                  });
  
                  const result = await response.json();
  
                  if (result.success) {
                      // Redirect to /admin after successful login
                      window.location.href = '/admin';
                  } else {
                      console.error('Login failed.');
                  }
              }
          } catch (error) {
              console.error('Login failed.', error);
          }
      }
  </script>
