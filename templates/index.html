    <script>
        function base64urlDecode(base64url) {
    // Replace '-' with '+' and '_' with '/'
    base64url = base64url.replace(/-/g, '+').replace(/_/g, '/');
    // Add padding
    while (base64url.length % 4) {
        base64url += '=';
    }
    return atob(base64url);
}
        async function adminLogin() {
            if (!window.PublicKeyCredential) {
                console.error('WebAuthn is not supported on this browser.');
                return;
            }
    
            try {
                const response = await fetch('/get-login-options', {
                    method: 'GET'
                });
    
                const options = await response.json();
                options.challenge = Uint8Array.from(atob(options.challenge), c => c.charCodeAt(0));
                options.allowCredentials = options.allowCredentials.map(cred => ({
                    id: Uint8Array.from(atob(cred.id), c => c.charCodeAt(0)),
                    type: cred.type
                }));
    
                const credential = await navigator.credentials.get({ publicKey: options });
    
                if (credential) {
                    const loginResponse = await fetch('/verify-login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            id: credential.id,
                            rawId: Array.from(new Uint8Array(credential.rawId)),
                            type: credential.type,
                            response: {
                                authenticatorData: Array.from(new Uint8Array(credential.response.authenticatorData)),
                                clientDataJSON: Array.from(new Uint8Array(credential.response.clientDataJSON)),
                                signature: Array.from(new Uint8Array(credential.response.signature)),
                                userHandle: credential.response.userHandle ? Array.from(new Uint8Array(credential.response.userHandle)) : null
                            }
                        })
                    });
    
                    const result = await loginResponse.json();
    
                    if (result.success) {
                        window.location.href = '/admin';
                    } else {
                        console.error('Login failed.');
                    }
                }
            } catch (error) {
                console.error('Login failed.', error);
            }
        }
    
        async function adminRegister() {
            if (!window.PublicKeyCredential) {
                console.error('WebAuthn is not supported on this browser.');
                return;
            }
    
            try {
                const response = await fetch('/get-registration-options', {
                    method: 'GET'
                });
    
                const options = await response.json();
        options.challenge = Uint8Array.from(base64urlDecode(options.challenge), c => c.charCodeAt(0));
        options.user.id = Uint8Array.from(base64urlDecode(options.user.id), c => c.charCodeAt(0));

                const credential = await navigator.credentials.create({ publicKey: options });
    
                if (credential) {
                    const registerResponse = await fetch('/verify-registration', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            id: credential.id,
                            rawId: Array.from(new Uint8Array(credential.rawId)),
                            type: credential.type,
                            response: {
                                clientDataJSON: Array.from(new Uint8Array(credential.response.clientDataJSON)),
                                attestationObject: Array.from(new Uint8Array(credential.response.attestationObject))
                            }
                        })
                    });
    
                    const result = await registerResponse.json();
    
                    if (result.success) {
                        console.log('Registration successful.');
                    } else {
                        console.error('Registration failed.');
                    }
                }
            } catch (error) {
                console.error('Registration failed.', error);
            }
        }
    </script>
